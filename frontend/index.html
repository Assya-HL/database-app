<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlatDB Studio — Professional</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <header class="main-header">
        <div class="logo-area">
            <div class="icon-box">📁</div>
            <div>
                <h1>FlatDB Studio</h1>
                <p class="status"><span class="pulse-dot"></span> FastAPI Backend Active (Port 8001)</p>
            </div>
        </div>
    </header>

    <div class="app-layout">
        <aside class="sidebar">
            <div class="section">
                <div class="section-header">
                    <span>Bases de Données</span>
                </div>
                <div class="form-row">
                    <input type="text" id="new-db-name" placeholder="Nom de la DB...">
                    <button onclick="createDatabase()" class="btn-add">+</button>
                </div>
                <div id="db-list" class="list-container">
                    </div>
            </div>

            <div class="section">
                <div class="section-header">
                    <span>Tables (<span id="current-db-name" style="color:var(--primary-hover);">Aucune</span>)</span>
                </div>
                <div class="form-row">
                    <input type="text" id="new-table-name" placeholder="Table...">
                    <input type="text" id="new-table-columns" placeholder="id,name,col...">
                    <button onclick="createTable()" class="btn-add">+</button>
                </div>
                <div id="table-list" class="list-container">
                    <div class="empty-msg">Sélectionnez une DB</div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <div class="table-card">
                <div class="table-header-meta">
                    <div>
                        <h2 id="active-table-title">Sélectionnez une table CSV</h2>
                        <p class="sub-text">Visualisation en temps réel</p>
                    </div>
                    <button onclick="openAddRowModal()" class="btn-primary">+ Ajouter une ligne</button>
                </div>

                <div class="table-wrapper">
                    <table id="data-table" class="professional-table">
                        <thead>
                            <tr id="table-headers"></tr>
                        </thead>
                        <tbody id="table-body">
                            <tr>
                                <td colspan="100%" style="text-align: center; color: var(--text-muted); padding: 40px;">
                                    Aucune donnée à afficher pour le moment.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        setTimeout(() => { lucide.createIcons(); }, 500);
    </script>
    <script src="script.js"></script>
</body>
</html>
