<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Database Manager</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<div class="sidebar">

<h2>Database Manager</h2>

<button onclick="createDatabasePrompt()">
+ Database
</button>

<ul id="dbList"></ul>

</div>


<div class="main">

<div class="topbar">

<h1 id="currentDB">

Select Database

</h1>

<button onclick="loadDatabases()">

Refresh

</button>

</div>


<div class="tables-header">

<h2>Tables</h2>

<button onclick="createTablePrompt()">

+ Table

</button>

</div>


<div id="tables">

</div>


<div class="records-header">

<h2>

Rows

</h2>

<button onclick="insertRowPrompt()">

+ Row

</button>

</div>


<div class="table-container">

<table id="records">

<thead>

</thead>

<tbody>

</tbody>

</table>

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
