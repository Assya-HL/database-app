<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>FlatDB Simple Test</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>📁 FlatDB Studio — Test Minimal</h2>
    <hr>

    <h3>1. Les Bases de Données</h3>
    <div style="margin-bottom: 15px;">
        <input type="text" id="new-db-name" placeholder="Nom de la DB (ex: ecom_db)">
        <button onclick="createDatabase()">+ Créer la DB</button>
    </div>
    
    <div id="db-list" style="border: 1px solid #ccc; padding: 10px; background: #eee;">
        Chargement des bases...
    </div>

    <hr>

    <h3>2. Les Tables dans la DB active: <span id="current-db-name" style="color: blue;">Aucune</span></h3>
    <div style="margin-bottom: 15px;">
        <input type="text" id="new-table-name" placeholder="Nom de la table (ex: users)">
        <input type="text" id="new-table-columns" placeholder="Colonnes (ex: id,name,email)">
        <button onclick="createTable()">+ Créer la Table</button>
    </div>

    <div id="table-list" style="border: 1px solid #ccc; padding: 10px; background: #eee;">
        Sélectionnez d'abord une base de données.
    </div>

    <hr>

    <h3>3. Données de la table: <span id="active-table-title" style="color: green;">Aucune</span></h3>
    <div style="margin-bottom: 15px;">
        <button onclick="openAddRowModal()">+ Ajouter une ligne</button>
    </div>

    <table border="1" cellpadding="5" id="data-table" style="width: 100%; border-collapse: collapse; display: none;">
        <thead>
            <tr id="table-headers"></tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>

    <script src="script.js"></script>
</body>
</html>
