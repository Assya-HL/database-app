<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DB Manager</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<!-- LEFT: DATABASES -->
<div class="panel left">

<h3>Databases</h3>

<button onclick="openModal('db')">+ New</button>

<div id="dbList"></div>

</div>

<!-- CENTER: TABLES -->
<div class="panel middle">

<h3 id="currentDB">Select Database</h3>

<button onclick="openModal('table')">+ Table</button>

<div id="tableList"></div>

</div>

<!-- RIGHT: ROWS -->
<div class="panel right">

<h3 id="currentTable">Rows</h3>

<button onclick="openModal('row')">+ Row</button>

<table>
<thead id="thead"></thead>
<tbody id="tbody"></tbody>
</table>

</div>

</div>

<!-- MODAL -->
<div id="modal" class="modal hidden">
<div class="modal-box">

<h3 id="modalTitle"></h3>
<div id="modalBody"></div>

<button onclick="save()">Save</button>
<button onclick="closeModal()">Cancel</button>

</div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>
